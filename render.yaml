services:
  - type: web
    name: pitchiq
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "from backend.models.train import train_and_evaluate; train_and_evaluate()"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: JWT_SECRET
        generateValue: true
